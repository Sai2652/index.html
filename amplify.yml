version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - echo "Static site - nothing to build."
  artifacts:
    baseDirectory: .
    files:
      - 'index.html'
      - 'amplify_outputs.json'
      - 'manifest.webmanifest'
      - 'icon.svg'
      - '404.html'
      - 'robots.txt'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
